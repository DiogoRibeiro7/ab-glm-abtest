# Codecov configuration for ab-glm-abtest

coverage:
  precision: 2
  round: down
  range: "80...100"

  status:
    project:
      default:
        target: 80%
        threshold: 2%
        paths:
          - "src/"

    patch:
      default:
        target: 80%
        threshold: 5%

    changes: false

parsers:
  gcov:
    branch_detection:
      conditional: yes
      loop: yes
      method: no
      macro: no

comment:
  layout: "reach,diff,flags,tree"
  behavior: default
  require_changes: false
  require_base: no
  require_head: yes

ignore:
  - "tests/**/*"
  - "scripts/**/*"
  - "docs/**/*"
  - "notebooks/**/*"
  - "**/test_*.py"
  - "**/*_test.py"
  - "setup.py"

flags:
  unittests:
    paths:
      - "src/"
    carryforward: true

# GitHub integration
github_checks:
  annotations: true