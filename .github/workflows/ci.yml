name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Run tests weekly to catch dependency issues
    - cron: '0 0 * * 0'

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.10', '3.11', '3.12']

    steps:
    - uses: actions/checkout@v5

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install Poetry
      uses: abatilo/actions-poetry@v4
      with:
        poetry-version: '1.8.3'

    - name: Cache Poetry virtual environment
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/pypoetry
          ~/.cache/pip
        key: ${{ runner.os }}-poetry-${{ matrix.python-version }}-${{ hashFiles('**/poetry.lock') }}
        restore-keys: |
          ${{ runner.os }}-poetry-${{ matrix.python-version }}-

    - name: Install dependencies
      run: |
        poetry install --with dev --no-interaction

    - name: Run tests with coverage
      run: |
        poetry run pytest tests/ -v --cov=src/ab_glm --cov-report=term-missing --cov-report=xml --cov-fail-under=80

    - name: Upload coverage to Codecov
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
      uses: codecov/codecov-action@v4
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Install Poetry
      uses: abatilo/actions-poetry@v4
      with:
        poetry-version: '1.8.3'

    - name: Install dependencies
      run: |
        poetry install --with dev --no-interaction

    - name: Run ruff linter
      run: |
        poetry run ruff check src/ tests/ scripts/

    - name: Run ruff formatter check
      run: |
        poetry run ruff format --check src/ tests/

  type-check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Install Poetry
      uses: abatilo/actions-poetry@v4
      with:
        poetry-version: '1.8.3'

    - name: Install dependencies
      run: |
        poetry install --with dev --no-interaction

    - name: Run mypy type checking
      run: |
        poetry run mypy src/ab_glm --ignore-missing-imports

  security:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Install Poetry
      uses: abatilo/actions-poetry@v4
      with:
        poetry-version: '1.8.3'

    - name: Install dependencies
      run: |
        poetry install --with dev --no-interaction
        pip install bandit[toml] safety

    - name: Run bandit security linter
      run: |
        bandit -r src/ -f json -o bandit-report.json
        if [ -f bandit-report.json ]; then
          python -m json.tool bandit-report.json
        fi

    - name: Check for known vulnerabilities
      run: |
        poetry export -f requirements.txt --without-hashes | safety check --stdin

  docs:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Install Poetry
      uses: abatilo/actions-poetry@v4
      with:
        poetry-version: '1.8.3'

    - name: Install dependencies
      run: |
        poetry install --with dev --no-interaction
        pip install sphinx sphinx-rtd-theme

    - name: Check documentation builds
      run: |
        cd docs
        make html || echo "Documentation build check completed"

  benchmark:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
    - uses: actions/checkout@v5

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Install Poetry
      uses: abatilo/actions-poetry@v4
      with:
        poetry-version: '1.8.3'

    - name: Install dependencies
      run: |
        poetry install --with dev --no-interaction

    - name: Run performance benchmarks
      run: |
        poetry run python -m src.ab_glm.performance > benchmark_results.txt || echo "Benchmark completed"
        cat benchmark_results.txt

    - name: Comment PR with benchmark results
      if: github.event_name == 'pull_request' && always()
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          let benchmarkResults = 'No benchmark results available';
          try {
            benchmarkResults = fs.readFileSync('benchmark_results.txt', 'utf8');
          } catch (e) {
            console.log('Could not read benchmark results');
          }
          const body = `## Performance Benchmark Results\n\n\`\`\`\n${benchmarkResults}\n\`\`\``;

          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: body
          });
